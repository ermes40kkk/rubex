<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jooble Jobs Map</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Jooble Jobs Map</h1>
      <p>Importa offerte, geocodifica location e visualizza marker su mappa.</p>
    </header>

    <main class="container">
      <section class="controls">
        <form id="import-form">
          <label>
            Keywords
            <input type="text" name="keywords" value="it" required />
          </label>
          <label>
            Location
            <input type="text" name="location" value="Berlin" required />
          </label>
          <label>
            Radius
            <input type="number" name="radius" value="25" min="1" />
          </label>
          <label>
            ResultOnPage
            <input type="number" name="ResultOnPage" value="20" min="1" max="100" />
          </label>
          <div class="buttons">
            <button type="submit">Importa lavori</button>
            <button type="button" id="load-map">Carica dati mappa</button>
          </div>
        </form>
        <p id="status" class="status"></p>
      </section>

      <section class="layout">
        <div id="map"></div>
        <aside>
          <h2>Risultati</h2>
          <ul id="jobs-list"></ul>
        </aside>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="/app.js"></script>
  </body>
</html>
